# (\u5176\u4ED6\u7CFB\u7EDF\u81EA\u884C\u8C03\u6574)
# \u8FD9\u662F windows \u7CFB\u7EDF\u6587\u4EF6\u76EE\u5F55\u683C\u5F0F\uFF0CD \u76D8\u4E0B VM_Space \u6587\u4EF6\u5939\u4E0B\u7684 Docker \u6587\u4EF6\u5939\u4E0B\u7684 Java_APP \u6587\u4EF6\u5939
file.root-in-server.path=D:/VM_Space/Docker/Java_APP
hygge.blog.database.autoGenerateDdl=true
# \u663E\u793A\u6267\u884C\u7684 SQL \u6A21\u677F
hygge.blog.database.showSql=true
# \u663E\u793A\u6570\u636E\u5E93\u4E8B\u52A1\u65B0\u9C9C
logging.level.org.hibernate.engine.transaction.internal.*=TRACE
# \u663E\u793A SQL \u6570\u636E\u7ED1\u5B9A\u7B49\u4FE1\u606F
logging.level.org.hibernate.orm.jdbc.*=TRACE
# \u5F00\u542F swagger \u9875
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
